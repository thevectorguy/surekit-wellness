kind = "web"
previewPath = "/"
title = "SureKit Sattva - Healing & Wellness"
version = "1.0.0"
id = "artifacts/surekit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20682

[services.development]
run = "pnpm --filter @workspace/surekit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/surekit", "run", "build" ]
publicDir = "artifacts/surekit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20682"
BASE_PATH = "/"
